<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR REST API</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body { 
    font-family:'Quicksand',sans-serif; 
    background:#ffffff; 
    color:#1a1a1a; 
    min-height:100vh; 
    display:flex; 
    flex-direction:column;
    align-items:center; 
    justify-content:flex-start; 
}

.top-bar {
    width:100%;
    background:#0091df;
    padding:14px;
    box-shadow:0 2px 10px rgba(0,145,223,0.15);
}

.container { 
    width:100%; 
    max-width:860px; 
    padding:40px 24px; 
}

.main-title { 
    text-align:center; 
    margin-top:20px;
    margin-bottom:24px; 
}

.main-title h1 { 
    font-size:56px; 
    font-weight:800; 
    color:#1a1a1a; 
    letter-spacing:-1.5px;
}

.main-title h1 span {
    color:#0091df; 
}

.info-bar {
    width:100%;
    background:#0091df;
    padding:14px 20px;
    border-radius:12px;
    text-align:center;
    margin-bottom:40px;
    box-shadow:0 4px 15px rgba(0,145,223,0.15);
}

.info-bar h2 { 
    font-size:15px; 
    font-weight:700; 
    color:#ffffff; 
    text-transform:uppercase; 
    letter-spacing:2px;
}

.upload-card { 
    background:#f8fafc; 
    border:1px solid #e2e8f0; 
    border-radius:20px; 
    padding:32px; 
    box-shadow:0 4px 25px rgba(0,0,0,0.02); 
    margin-bottom:32px; 
}

.upload-row { 
    display:flex; 
    flex-direction:column; 
    gap:20px; 
}

@media (min-width:640px) { 
    .upload-row { 
        flex-direction:row; 
        align-items:center; 
    } 
}

.dropzone { 
    flex:1; 
    border:2px dashed #cbd5e1; 
    border-radius:14px; 
    padding:40px 20px; 
    position:relative; 
    cursor:pointer; 
    background:#ffffff; 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    transition:.2s;
}

.dropzone:hover, .dropzone.dragover { 
    border-color:#0091df; 
    background:#fdfdfd; 
}

.dropzone input { 
    position:absolute; 
    inset:0; 
    opacity:0; 
    cursor:pointer; 
}

.dropzone-content { 
    text-align:center; 
}

.dropzone-content strong { 
    display:block; 
    font-size:18px; 
    color:#1a1a1a; 
    font-weight:700; 
}

.dropzone-content p { 
    font-size:14px; 
    color:#64748b; 
    margin-top:6px; 
    font-weight:600; 
}

#submitBtn { 
    padding:0 32px; 
    height:60px; 
    border:none; 
    border-radius:14px; 
    background:#0091df; 
    color:white; 
    font-size:16px; 
    font-weight:700; 
    cursor:pointer; 
    font-family:'Quicksand',sans-serif; 
    transition:.2s;
}

#submitBtn:hover:not(:disabled) { 
    background:#007bc2; 
    box-shadow:0 4px 15px rgba(0,145,223,0.3);
}

#submitBtn:disabled { 
    background:#e2e8f0; 
    color:#94a3b8; 
    cursor:not-allowed; 
}

.output-wrap { 
    background:#ffffff; 
    border:1px solid #e2e8f0; 
    border-radius:20px; 
    overflow:hidden; 
    box-shadow:0 10px 30px rgba(0,0,0,0.04); 
}

.output-header { 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
    padding:18px 24px; 
    background:#f8fafc; 
    border-bottom:1px solid #e2e8f0; 
}

.output-header span { 
    font-weight:700; 
    font-size:16px; 
    color:#1a1a1a; 
}

.copy { 
    border:1px solid #cbd5e1; 
    background:#ffffff; 
    padding:8px 16px; 
    border-radius:10px; 
    font-size:14px; 
    font-weight:700; 
    cursor:pointer; 
    color:#0091df; 
    font-family:'Quicksand',sans-serif; 
    transition:.2s;
}

.copy:hover { 
    background:#f8fafc; 
    border-color:#0091df; 
}

.output { 
    min-height:400px; 
    padding:24px; 
    line-height:1.75; 
    white-space:pre-wrap; 
    font-family:'Fira Code',monospace; 
    font-size:15px; 
    color:#334155; 
    background:#ffffff; 
}

.output table { 
    width:100%; 
    border-collapse:collapse; 
}

.output th, .output td { 
    border:1px solid #e2e8f0; 
    padding:8px; 
}

.output th { 
    background:#f8fafc; 
}
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="container">

    <div class="main-title">
        <h1>OCR <span>REST API</span></h1>
    </div>

    <div class="info-bar">
        <h2>Projektni zadatak • Frane Brkić</h2>
    </div>

    <div class="upload-card">
        <div class="upload-row">
            <div class="dropzone" id="dropzone">
                <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.pdf">
                <div class="dropzone-content">
                    <strong id="dzText">Ovdje prenesi datoteku ili klikni za odabir</strong>
                    <p>PDF, PNG, JPG, JPEG</p>
                </div>
            </div>
            <button id="submitBtn" onclick="submit()" disabled>Pokreni OCR</button>
        </div>
    </div>

    <div class="output-wrap">
        <div class="output-header">
            <span>Ekstrahirani tekst</span>
            <button class="copy" id="copyBtn" onclick="copy()" style="display:none">Kopiraj</button>
        </div>
        <div class="output" id="output"></div>
    </div>

</div>

<script>
let file=null;
let raw='';

document.getElementById('fileInput').addEventListener('change',e=>setFile(e.target.files[0]));

const dz=document.getElementById('dropzone');

dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{
e.preventDefault();
dz.classList.remove('dragover');
setFile(e.dataTransfer.files[0]);
});

function setFile(f){
if(!f)return;
file=f;
document.getElementById('dzText').textContent=f.name;
document.getElementById('submitBtn').disabled=false;
}

async function submit(){
if(!file)return;

const btn=document.getElementById('submitBtn');
btn.disabled=true;
btn.textContent='Obrada...';

document.getElementById('output').innerHTML='';
document.getElementById('copyBtn').style.display='none';

const fd=new FormData();
fd.append('file',file);

try{
const response=await fetch('/api/v1/ocr',{method:'POST',body:fd});
const data=await response.json();

raw=data.markdown||data.detail||'';
document.getElementById('output').innerHTML=raw;
document.getElementById('copyBtn').style.display='inline-block';
}
catch(err){
document.getElementById('output').textContent='Greška: '+err.message;
}

btn.disabled=false;
btn.textContent='Pokreni OCR';
}

async function copy(){
await navigator.clipboard.writeText(raw);
}
</script>

</body>
</html>
